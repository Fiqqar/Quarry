services:
  postgres:
    image: postgres:16
    container_name: quarry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quarry
    ports:
      - "5432:5432"
    volumes:
      - quarry_postgres_data:/var/lib/postgresql/data

volumes:
  quarry_postgres_data:
